# gitleaks configuration — extends the default ruleset and allowlists known
# false positives (CI cache keys flagged on entropy alone; cache keys are not
# secrets). Scoped to the cache-key pattern so real secrets still surface.
[extend]
useDefault = true

[allowlist]
description = "CI cache keys are not secrets"
regexes = [
  '''corpus-apfs-v[0-9]+''',
]
